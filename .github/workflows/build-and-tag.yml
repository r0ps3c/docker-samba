name: Build and Tag

on:
  schedule:
    - cron: '0 4 * * 1'  # Weekly Monday 04:00 UTC
  push:
    branches:
      - main
      - stable
  pull_request:
    branches:
      - main
      - stable
  workflow_dispatch:

jobs:
  build-scan-push:
    uses: r0ps3c/gh-shared-workflows/.github/workflows/docker-build-scan-push.yml@9430b098f0d7aa6a31a5779a01e6f690fac1baed # main
    permissions:
      contents: read
      packages: write
      security-events: write
    with:
      image-ref: samba:main
      primary_branch: master
      version-extract-command: "apk info samba 2>/dev/null | grep '^samba-' | head -1 | cut -d- -f2 | cut -dr -f1"
      test-command: make test-structure && make test-standalone && make test-integration
    secrets: inherit
